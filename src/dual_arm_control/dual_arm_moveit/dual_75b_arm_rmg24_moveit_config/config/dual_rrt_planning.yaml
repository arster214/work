planning_plugin: dual_arm_rrt_planner/DualArmTRRTPlannerManager

planner_configs:
  DualArmTRRT:
    type: geometric::TRRT
    range: 0.0
    goal_bias: 0.3
    enable_connect: true
    sampling_strategy: sobol
    sobol_candidate_pool_size: 12
    sobol_sort_by_goal_distance: true
    temp_change_factor: 0.1
    init_temperature: 100.0
    frontier_threshold: 0.0
    frontier_node_ratio: 0.1
    cost_threshold: inf
    min_parent_child_distance: 0.0
    min_parent_child_distance_scale: 0.3
    max_sampling_attempts_per_iteration: 100

default_planner_config: DualArmTRRT

dual_arms:
  planner_configs:
    - DualArmTRRT
  default_planner_config: DualArmTRRT
  projection_evaluator: joints(l_joint1,r_joint1)
  longest_valid_segment_fraction: 0.005

robot:
  planning_group: dual_arms
  left_arm_group: l_arm
  right_arm_group: r_arm
  configuration_dimension: 14
  joint_order:
    - l_joint1
    - l_joint2
    - l_joint3
    - l_joint4
    - l_joint5
    - l_joint6
    - l_joint7
    - r_joint1
    - r_joint2
    - r_joint3
    - r_joint4
    - r_joint5
    - r_joint6
    - r_joint7

state_space:
  type: real_vector
  enforce_joint_bounds: true
  joint_bounds:
    l_joint1:
      lower: -3.11
      upper: 3.11
      max_velocity: 3.14
      has_acceleration_limits: false
      max_acceleration: 0.0
    l_joint2:
      lower: -2.27
      upper: 2.27
      max_velocity: 3.14
      has_acceleration_limits: false
      max_acceleration: 0.0
    l_joint3:
      lower: -3.11
      upper: 3.11
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    l_joint4:
      lower: -2.36
      upper: 2.36
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    l_joint5:
      lower: -3.11
      upper: 3.11
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    l_joint6:
      lower: -2.23
      upper: 2.23
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    l_joint7:
      lower: -6.28
      upper: 6.28
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    r_joint1:
      lower: -3.11
      upper: 3.11
      max_velocity: 3.14
      has_acceleration_limits: false
      max_acceleration: 0.0
    r_joint2:
      lower: -2.27
      upper: 2.27
      max_velocity: 3.14
      has_acceleration_limits: false
      max_acceleration: 0.0
    r_joint3:
      lower: -3.11
      upper: 3.11
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    r_joint4:
      lower: -2.36
      upper: 2.36
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    r_joint5:
      lower: -3.11
      upper: 3.11
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    r_joint6:
      lower: -2.23
      upper: 2.23
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0
    r_joint7:
      lower: -6.28
      upper: 6.28
      max_velocity: 3.925
      has_acceleration_limits: false
      max_acceleration: 0.0

collision_checking:
  check_self_collision: true
  check_environment_collision: true
  state_validity_checking_resolution: 0.01
  longest_valid_segment_fraction: 0.005
  allowed_start_state_in_collision: false
  allowed_goal_state_in_collision: false

cost_objective:
  type: mechanical_work
  use_motion_cost_interpolation: true
  clearance_epsilon: 0.01
  invalid_state_cost: 1000000.0

heatmap:
  enabled: true
  environment_topic: /map_process/environment_info
  service_name: /clearance_heatmap_server/generate_clearance_heatmap
  left_query_link: l_link7
  right_query_link: r_link7
  resolution: 0.05
  request_timeout_seconds: 1.0
  workspace_padding: 0.10
  safety_clearance_low: 0.00
  safety_clearance_high: 0.15
  objective_weight: 6.0
  objective_clearance_threshold: 0.04
  step_min_scale: 0.35
  sampling_min_keep_probability: 0.20

visualization:
  enabled: true
  marker_topic: /dual_arm_trrt/tree_markers
  marker_latch: false
  frame_id: base_link_underpan
  left_tip_link: l_link7
  right_tip_link: r_link7
  publish_on_success: true
  publish_on_failure: true
  publish_vertices: true
  max_tree_vertices: 500
  max_tree_edges: 1000
  max_solution_branch_points: 200
  max_solution_path_points: 200
  edge_scale: 0.003
  vertex_scale: 0.010
  publish_solution_branch: true
  solution_branch_edge_scale: 0.006
  publish_solution_path: true
  solution_edge_scale: 0.009
  left_marker_rgba: [0.95, 0.35, 0.20, 0.90]
  right_marker_rgba: [0.20, 0.45, 0.95, 0.90]
  left_solution_branch_rgba: [1.00, 0.55, 0.10, 1.00]
  right_solution_branch_rgba: [0.10, 0.95, 0.95, 1.00]
  left_solution_rgba: [1.00, 0.95, 0.10, 1.00]
  right_solution_rgba: [0.15, 1.00, 0.55, 1.00]

solve:
  max_planning_time_seconds: 10.0
  planning_attempts: 1
  goal_tolerance: 0.05
  allow_approximate_solution: false
  max_approximate_goal_distance: 0.05
  simplify_solution: true
  simplification_strategy: reduce_vertices
  reduce_vertices_max_steps: 40
  reduce_vertices_max_empty_steps: 15
  reduce_vertices_range_ratio: 0.10
  shortcut_max_steps: 240
  shortcut_max_empty_steps: 60
  shortcut_range_ratio: 0.20
  shortcut_snap_to_vertex: 0.005
  smooth_bspline: false
  smooth_bspline_max_steps: 0
  smooth_bspline_min_change: 0.0
  preserve_tail_ratio: 0.05
  interpolate_solution: true
  interpolation_step: 0.02
